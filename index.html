<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой профиль</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main class="profile">
        <!-- Аватарка и имя -->
        <header class="profile-header">
            <img src="https://img.freepik.com/premium-photo/young-businessman-working-job-drinking-hot-drink-with-coffee-tea-gusher_31965-509877.jpg?semt=ais_hybrid" alt="Моё фото" class="profile-avatar">
            <h1 class="profile-name">Имя Фамилия</h1>
            <p class="profile-bio">Краткое описание: frontend-разработчик, люблю чистый код и хороший кофе.</p>
        </header>

        <!-- Секция с навыками -->
        <section class="skills">
            <h2>Навыки</h2>
            <ul class="skills-list">
                <li>HTML5</li>
                <li>CSS3</li>
                <li>JavaScript (изучаю)</li>
            </ul>
        </section>

        <section class="hobby">
             <h2 class="hobby__title">Хобби</h2>
            <ul class="hobby-list">
                <li class="hobby__list-item">Книги 📚</li>
                <li class="hobby__list-item">Футбол ⚽</li>
                <li class="hobby__list-item">Видеоигра 🎮</li>
            </ul>
        </section>

        <!-- Социальные ссылки -->
        <footer class="profile-footer">
            <a href="#" class="link">GitHub</a>
            <a href="#" class="link">Telegram</a>
            <a href="#" class="link">Email</a>
        </footer>
    </main>
</body>

</html>
